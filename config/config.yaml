project:
  name: "Social Media Topic Discovery for Disaster Response"
  course: "INT 396 — Unsupervised Learning"
  random_seed: 42
  stability_seeds: [42, 123, 456]

datasets:
  humaid:
    source: "QCRI/HumAID-all"
    description: "76,484 English tweets across 19 disaster events"
  crisisbench:
    source: "QCRI/CrisisBench-all-lang"
    config: "humanitarian"
    description: "132,619 tweets, filtered to English only"
    validation_events:
      - name: "2015 Nepal Earthquake"
        type: "earthquake"
      - name: "Hurricane Harvey"
        type: "hurricane"
      - name: "2013 Alberta Floods"
        type: "flood"

preprocessing:
  remove_urls: true
  remove_mentions: true
  remove_rt_markers: true
  remove_exact_duplicates: true
  normalize_hashtags: true  # strip # but keep text

feature_extraction:
  sbert:
    model: "all-MiniLM-L6-v2"
    dim: 384
  tfidf:
    max_features: 10000
    ngram_range: [1, 2]

dimensionality_reduction:
  umap:
    grid_search:
      n_neighbors: [5, 10, 15, 30]
      min_dist: [0.0, 0.1, 0.25, 0.5]
      sample_size: 15000
    clustering_dim: 5
    viz_dim: 2
  pca:
    clustering_dim: 50
    viz_dim: 2
  truncated_svd:
    clustering_dim: 50
    viz_dim: 2
  tsne:
    perplexity: 30
    viz_only: true

clustering:
  kmeans:
    k_range: [3, 20]
  hdbscan:
    min_cluster_size_range: [10, 300]
  agglomerative:
    linkage: "ward"

evaluation:
  convex_metrics: ["silhouette", "davies_bouldin", "calinski_harabasz"]
  density_metrics: ["dbcv", "noise_rate"]
  agreement_metrics: ["ari", "nmi"]
